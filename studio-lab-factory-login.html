<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Lab Factory — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:#FFFFFF;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:48px 24px;}
.wrap{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center;}
.logo-img{width:240px;max-width:65vw;display:block;margin:0 auto;mix-blend-mode:multiply;}
.by{font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:#B8B4AC;text-align:center;margin-top:12px;margin-bottom:40px;font-weight:200;font-style:italic;}
.orn{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:40px;}
.ol{width:28px;height:0.5px;background:rgba(14,13,12,0.12);}
.od{width:3px;height:3px;background:#B8B4AC;transform:rotate(45deg);opacity:0.5;}
.form{width:100%;max-width:420px;}
.fg{margin-bottom:22px;}
.lbl{display:block;font-size:9px;letter-spacing:0.26em;text-transform:uppercase;color:#9E9B94;margin-bottom:10px;font-weight:400;}
.inp{width:100%;padding:11px 0;background:transparent;border:none;border-bottom:0.5px solid rgba(14,13,12,0.15);font-size:14px;color:#1A1A1A;outline:none;font-family:'Jost',sans-serif;font-weight:300;transition:border-color 0.2s;}
.inp::placeholder{color:#9E9B94;font-weight:200;}
.inp:focus{border-bottom-color:#5d0505;}
.inp.error{border-bottom-color:#B22222;}
.forgot{display:block;text-align:right;font-size:10px;color:#9E9B94;margin-top:8px;text-decoration:none;font-weight:300;transition:color 0.15s;}
.forgot:hover{color:#5d0505;}
.btn{width:100%;margin-top:32px;padding:14px;background:#5d0505;color:#FFFFFF;border:none;font-size:10px;letter-spacing:0.26em;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;font-weight:400;transition:background 0.2s;position:relative;overflow:hidden;}
.btn:hover{background:#3d0303;}
.btn-text{display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity 0.2s;}
.btn.loading .btn-text{opacity:0;}
.btn-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
.btn.loading .btn-loader{opacity:1;}
.loader-ring{width:14px;height:14px;border:1px solid rgba(255,255,255,0.3);border-top-color:#FFFFFF;border-radius:50%;animation:spin 0.7s linear infinite;}
.error-msg{font-size:11px;color:#B22222;margin-top:14px;font-weight:300;display:none;text-align:center;letter-spacing:0.04em;}
.error-msg.show{display:block;}
.footer{margin-top:52px;text-align:center;padding-bottom:8px;}
.fq{font-style:italic;font-size:11px;color:#9E9B94;margin-bottom:8px;font-weight:300;}
.fp{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;}
.fpi{font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:#5d0505;opacity:0.7;font-weight:300;}
.fs{color:#5d0505;opacity:0.25;font-size:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:480px){body{padding:32px 20px;}}
</style>
</head>

<script>
const SB_URL='https://ayvppvheeegczreiyllx.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5dnBwdmhlZWVnY3pyZWl5bGx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTc4MzgsImV4cCI6MjA5MzI5MzgzOH0.khyU1SItlBnVgaT2emN66unQZPeIkpw6K5UapsScviA';
const APP_URL='studio-lab-factory-v2.html';
async function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('btn-login'),errEl=document.getElementById('error-msg');
  const uInput=document.getElementById('username'),pInput=document.getElementById('password');
  const username=uInput.value.trim(),password=pInput.value;
  errEl.classList.remove('show');uInput.classList.remove('error');pInput.classList.remove('error');
  btn.classList.add('loading');btn.disabled=true;
  try{
    const res=await fetch(`${SB_URL}/rest/v1/users?username=eq.${encodeURIComponent(username)}&is_active=eq.true&select=id,username,role,password_hash`,
      {headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}});
    if(!res.ok)throw new Error('network');
    const users=await res.json();
    if(!users||users.length===0||users[0].password_hash!==password)throw new Error('bad_creds');
    const user=users[0];
    fetch(`${SB_URL}/rest/v1/users?id=eq.${user.id}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({last_login:new Date().toISOString()})}).catch(()=>{});
    sessionStorage.setItem('slf_session',JSON.stringify({id:user.id,username:user.username,role:user.role,loginTime:Date.now()}));
    window.location.href=APP_URL;
  }catch(err){
    btn.classList.remove('loading');btn.disabled=false;
    errEl.textContent=err.message==='bad_creds'?'Identifiant ou mot de passe incorrect.':'Erreur de connexion — réessaie.';
    errEl.classList.add('show');uInput.classList.add('error');pInput.classList.add('error');pInput.value='';pInput.focus();
  }
}
if(sessionStorage.getItem('slf_session'))window.location.href=APP_URL;
</script>
